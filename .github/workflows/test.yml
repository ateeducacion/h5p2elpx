name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Lint (biome)
        run: bunx biome check .
      - name: Typecheck
        run: bunx tsc --noEmit
      - name: Tests
        run: bunx vitest run
