name: publish-packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish, without the leading v
        required: true

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: "@ateeducacion"
      - run: bun install --frozen-lockfile
      - run: bunx biome check .
      - run: bunx tsc --noEmit
      - run: bunx vitest run
      - name: Set package versions from release
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version: $VERSION" >&2
            exit 1
          fi

          npm version "$VERSION" --no-git-tag-version
          npm version "$VERSION" --no-git-tag-version --prefix packages/core
          npm version "$VERSION" --no-git-tag-version --prefix packages/cli
          npm version "$VERSION" --no-git-tag-version --prefix packages/web
          npm pkg set "dependencies.@ateeducacion/h5p2elpx-core=$VERSION" --prefix packages/cli
          npm pkg set "dependencies.@ateeducacion/h5p2elpx-core=$VERSION" --prefix packages/web
      - name: Publish core
        working-directory: packages/core
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish CLI
        working-directory: packages/cli
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
